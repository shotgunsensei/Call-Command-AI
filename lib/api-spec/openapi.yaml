    patch:
      operationId: updateReceptionistProfile
      tags: [receptionist]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReceptionistProfileBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceptionistProfile"
    delete:
      operationId: deleteReceptionistProfile
