openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CallCommand AI API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: calls
    description: Call records
  - name: actionItems
    description: Action items
  - name: integrations
    description: Webhook integrations
  - name: storage
    description: Object storage
  - name: stats
    description: Dashboard stats
  - name: billing
    description: Billing & plans
  - name: automation
    description: Automation rules
  - name: tickets
    description: Tickets created from calls
  - name: leads
    description: Leads created from calls
  - name: tasks
    description: Tasks created from calls
  - name: followups
    description: Follow-up messages
  - name: ingestion
    description: External ingestion sources
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [health]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

  /calls:
    get:
      operationId: listCalls
      tags: [calls]
      summary: List call records
      parameters:
        - in: query
          name: q
          required: false
          schema: { type: string }
        - in: query
          name: status
          required: false
          schema: { type: string }
        - in: query
          name: priority
          required: false
          schema: { type: string }
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallList"
    post:
      operationId: createCall
      tags: [calls]
      summary: Create a call record from an upload (kicks off processing)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCallBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"

  /calls/{id}:
    get:
      operationId: getCall
      tags: [calls]
      summary: Get a single call record
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Call
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteCall
      tags: [calls]
      summary: Delete a call record
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /calls/{id}/process:
    post:
      operationId: processCall
      tags: [calls]
      summary: (Re)process the call - transcribe and analyze
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"

  /calls/{id}/webhook:
    post:
      operationId: sendCallWebhook
      tags: [calls]
      summary: Send the call payload to a configured webhook
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendWebhookBody"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResult"

  /calls/{id}/pdf:
    get:
      operationId: getCallPdf
      tags: [calls]
      summary: Download a PDF report of the call
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: PDF stream
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /action-items/{id}:
    patch:
      operationId: updateActionItem
      tags: [actionItems]
      summary: Update an action item (toggle status / change due date)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateActionItemBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionItem"

  /integrations:
    get:
      operationId: listIntegrations
      tags: [integrations]
      summary: List configured webhook integrations
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationList"
    post:
      operationId: createIntegration
      tags: [integrations]
      summary: Create a new webhook integration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIntegrationBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"

  /integrations/{id}:
    patch:
      operationId: updateIntegration
      tags: [integrations]
      summary: Update an integration
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIntegrationBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"
    delete:
      operationId: deleteIntegration
      tags: [integrations]
      summary: Delete an integration
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /integrations/{id}/test:
    post:
      operationId: testIntegration
      tags: [integrations]
      summary: Send a test payload to a webhook
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResult"

  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /billing/checkout:
    post:
      operationId: createCheckoutSession
      tags: [billing]
      summary: Create a Stripe checkout session (placeholder if Stripe not configured)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutBody"
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"

  /billing/plan:
    get:
      operationId: getBillingPlan
      tags: [billing]
      summary: Get current plan details
      responses:
        "200":
          description: Plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingPlan"

  /me/ingestion-token:
    get:
      operationId: getIngestionToken
      tags: [ingestion]
      summary: Get the current user's ingestion token (for external webhooks)
      responses:
        "200":
          description: Token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionTokenResponse"
    post:
      operationId: rotateIngestionToken
      tags: [ingestion]
      summary: Rotate (regenerate) the ingestion token
      responses:
        "200":
          description: New token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionTokenResponse"

  /automation-rules:
    get:
      operationId: listAutomationRules
      tags: [automation]
      summary: List automation rules
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRuleList"
    post:
      operationId: createAutomationRule
      tags: [automation]
      summary: Create a new automation rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAutomationRuleBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRule"

  /automation-rules/{id}:
    patch:
      operationId: updateAutomationRule
      tags: [automation]
      summary: Update a rule
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAutomationRuleBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRule"
    delete:
      operationId: deleteAutomationRule
      tags: [automation]
      summary: Delete a rule
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /tickets:
    get:
      operationId: listTickets
      tags: [tickets]
      summary: List tickets
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketList"

  /tickets/{id}:
    patch:
      operationId: updateTicket
      tags: [tickets]
      summary: Update a ticket
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTicketBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
    delete:
      operationId: deleteTicket
      tags: [tickets]
      summary: Delete a ticket
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List leads
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadList"

  /leads/{id}:
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update a lead
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Delete a lead
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskList"

  /tasks/{id}:
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /follow-ups:
    get:
      operationId: listFollowups
      tags: [followups]
      summary: List sent follow-ups
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowupList"

  /calls/{id}/follow-up:
    post:
      operationId: sendFollowup
      tags: [followups]
      summary: Send a follow-up message for a call (simulated email)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendFollowupBody"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Followup"

  /calls/{id}/run-rules:
    post:
      operationId: runRulesForCall
      tags: [automation]
      summary: Re-run automation rules against a single call
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleExecutionResult"

  /ingestion-events:
    get:
      operationId: listIngestionEvents
      tags: [ingestion]
      summary: List recent ingestion events
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionEventList"

  /demo/simulate-call:
    post:
      operationId: simulateInboundCall
      tags: [ingestion]
      summary: Simulate an inbound call event (for demo / no integrations setup)
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    Error:
      type: object
      properties:
        error: { type: string }
      required: [error]

    Me:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        name: { type: ["string", "null"] }
        avatarUrl: { type: ["string", "null"] }
        plan: { type: string }
        callsThisMonth: { type: integer }
        monthlyLimit: { type: integer }
        demoMode: { type: boolean }
      required:
        [id, email, plan, callsThisMonth, monthlyLimit, demoMode]

    RequestUploadUrlBody:
      type: object
      properties:
        name: { type: string }
        size: { type: integer }
        contentType: { type: string }
      required: [name, size, contentType]

    RequestUploadUrlResponse:
      type: object
      properties:
        uploadURL: { type: string }
        objectPath: { type: string }
      required: [uploadURL, objectPath]

    CreateCallBody:
      type: object
      properties:
        objectPath: { type: string }
        originalFilename: { type: string }
      required: [objectPath, originalFilename]

    ActionItem:
      type: object
      properties:
        id: { type: string }
        callRecordId: { type: string }
        title: { type: string }
        description: { type: ["string", "null"] }
        dueDate: { type: ["string", "null"], format: date-time }
        priority: { type: string }
        status: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        [id, callRecordId, title, priority, status, createdAt, updatedAt]

    UpdateActionItemBody:
      type: object
      properties:
        status: { type: string }
        priority: { type: string }
        title: { type: string }
        description: { type: ["string", "null"] }
        dueDate: { type: ["string", "null"], format: date-time }

    Call:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        originalFilename: { type: string }
        fileUrl: { type: ["string", "null"] }
        transcriptText: { type: ["string", "null"] }
        summary: { type: ["string", "null"] }
        customerName: { type: ["string", "null"] }
        companyName: { type: ["string", "null"] }
        callerPhone: { type: ["string", "null"] }
        callType: { type: ["string", "null"] }
        intent: { type: ["string", "null"] }
        priority: { type: ["string", "null"] }
        sentiment: { type: ["string", "null"] }
        status: { type: string }
        durationSeconds: { type: ["integer", "null"] }
        keyPoints:
          type: array
          items: { type: string }
        followUpMessage: { type: ["string", "null"] }
        internalNotes: { type: ["string", "null"] }
        crmJson: { type: ["object", "null"] }
        suggestedTags:
          type: array
          items: { type: string }
        isDemo: { type: string }
        errorMessage: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        actionItems:
          type: array
          items: { $ref: "#/components/schemas/ActionItem" }
      required:
        [
          id,
          userId,
          originalFilename,
          status,
          keyPoints,
          suggestedTags,
          isDemo,
          createdAt,
          updatedAt,
          actionItems,
        ]

    CallList:
      type: array
      items: { $ref: "#/components/schemas/Call" }

    SendWebhookBody:
      type: object
      properties:
        integrationId: { type: string }
      required: [integrationId]

    WebhookResult:
      type: object
      properties:
        ok: { type: boolean }
        status: { type: ["integer", "null"] }
        message: { type: ["string", "null"] }
      required: [ok]

    Integration:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        type: { type: string }
        name: { type: string }
        webhookUrl: { type: string }
        enabled: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        [id, userId, type, name, webhookUrl, enabled, createdAt, updatedAt]

    IntegrationList:
      type: array
      items: { $ref: "#/components/schemas/Integration" }

    CreateIntegrationBody:
      type: object
      properties:
        type: { type: string }
        name: { type: string }
        webhookUrl: { type: string }
        enabled: { type: boolean }
      required: [type, name, webhookUrl]

    UpdateIntegrationBody:
      type: object
      properties:
        name: { type: string }
        webhookUrl: { type: string }
        enabled: { type: boolean }

    SentimentBucket:
      type: object
      properties:
        sentiment: { type: string }
        count: { type: integer }
      required: [sentiment, count]

    TagCount:
      type: object
      properties:
        tag: { type: string }
        count: { type: integer }
      required: [tag, count]

    DashboardStats:
      type: object
      properties:
        totalCalls: { type: integer }
        callsThisMonth: { type: integer }
        openActionItems: { type: integer }
        highPriorityCalls: { type: integer }
        openTickets: { type: integer }
        newLeadsThisWeek: { type: integer }
        openTasks: { type: integer }
        angrySentimentAlerts: { type: integer }
        conversionFunnel:
          type: object
          properties:
            calls: { type: integer }
            leads: { type: integer }
            closedLeads: { type: integer }
          required: [calls, leads, closedLeads]
        recentCalls:
          type: array
          items: { $ref: "#/components/schemas/Call" }
        sentimentBreakdown:
          type: array
          items: { $ref: "#/components/schemas/SentimentBucket" }
        topTags:
          type: array
          items: { $ref: "#/components/schemas/TagCount" }
      required:
        [
          totalCalls,
          callsThisMonth,
          openActionItems,
          highPriorityCalls,
          openTickets,
          newLeadsThisWeek,
          openTasks,
          angrySentimentAlerts,
          conversionFunnel,
          recentCalls,
          sentimentBreakdown,
          topTags,
        ]

    CreateCheckoutBody:
      type: object
      properties:
        plan: { type: string }
      required: [plan]

    CheckoutSession:
      type: object
      properties:
        url: { type: ["string", "null"] }
        configured: { type: boolean }
        message: { type: ["string", "null"] }
      required: [configured]

    BillingPlan:
      type: object
      properties:
        plan: { type: string }
        callsThisMonth: { type: integer }
        monthlyLimit: { type: integer }
        stripeConfigured: { type: boolean }
      required: [plan, callsThisMonth, monthlyLimit, stripeConfigured]

    IngestionTokenResponse:
      type: object
      properties:
        # Raw token. Only populated immediately after rotation (POST) — the
        # server only stores a SHA-256 hash, so subsequent GETs return null.
        token: { type: ["string", "null"] }
        hasToken: { type: boolean }
        endpoints:
          type: object
          properties:
            twilio: { type: string }
            email: { type: string }
            webhook: { type: string }
          required: [twilio, email, webhook]
      required: [token, hasToken, endpoints]

    AutomationRule:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        name: { type: string }
        triggerType: { type: string }
        conditions: { type: object }
        actions:
          type: array
          items: { type: object }
        enabled: { type: boolean }
        isDefault: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        [id, userId, name, triggerType, conditions, actions, enabled, isDefault, createdAt, updatedAt]

    AutomationRuleList:
      type: array
      items: { $ref: "#/components/schemas/AutomationRule" }

    CreateAutomationRuleBody:
      type: object
      properties:
        name: { type: string }
        triggerType: { type: string }
        conditions: { type: object }
        actions:
          type: array
          items: { type: object }
        enabled: { type: boolean }
      required: [name, conditions, actions]

    UpdateAutomationRuleBody:
      type: object
      properties:
        name: { type: string }
        conditions: { type: object }
        actions:
          type: array
          items: { type: object }
        enabled: { type: boolean }

    Ticket:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        title: { type: string }
        description: { type: ["string", "null"] }
        priority: { type: string }
        status: { type: string }
        linkedCallId: { type: ["string", "null"] }
        createdByRuleId: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, userId, title, priority, status, createdAt, updatedAt]

    TicketList:
      type: array
      items: { $ref: "#/components/schemas/Ticket" }

    UpdateTicketBody:
      type: object
      properties:
        title: { type: string }
        description: { type: ["string", "null"] }
        priority: { type: string }
        status: { type: string }

    Lead:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        name: { type: string }
        phone: { type: ["string", "null"] }
        company: { type: ["string", "null"] }
        intent: { type: ["string", "null"] }
