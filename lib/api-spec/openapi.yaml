openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CallCommand AI API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: calls
    description: Call records
  - name: actionItems
    description: Action items
  - name: integrations
    description: Webhook integrations
  - name: storage
    description: Object storage
  - name: stats
    description: Dashboard stats
  - name: billing
    description: Billing & plans
  - name: automation
    description: Automation rules
  - name: tickets
    description: Tickets created from calls
  - name: leads
    description: Leads created from calls
  - name: tasks
    description: Tasks created from calls
  - name: followups
    description: Follow-up messages
  - name: ingestion
    description: External ingestion sources
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [health]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

  /calls:
    get:
      operationId: listCalls
      tags: [calls]
      summary: List call records
      parameters:
        - in: query
          name: q
          required: false
          schema: { type: string }
        - in: query
          name: status
          required: false
          schema: { type: string }
        - in: query
          name: priority
          required: false
          schema: { type: string }
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallList"
    post:
      operationId: createCall
      tags: [calls]
      summary: Create a call record from an upload (kicks off processing)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCallBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"

  /calls/{id}:
    get:
      operationId: getCall
      tags: [calls]
      summary: Get a single call record
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Call
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteCall
      tags: [calls]
      summary: Delete a call record
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /calls/{id}/process:
    post:
      operationId: processCall
      tags: [calls]
      summary: (Re)process the call - transcribe and analyze
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"

  /calls/{id}/webhook:
    post:
      operationId: sendCallWebhook
      tags: [calls]
      summary: Send the call payload to a configured webhook
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendWebhookBody"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResult"

  /calls/{id}/pdf:
    get:
      operationId: getCallPdf
      tags: [calls]
      summary: Download a PDF report of the call
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: PDF stream
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /action-items/{id}:
    patch:
      operationId: updateActionItem
      tags: [actionItems]
      summary: Update an action item (toggle status / change due date)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateActionItemBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionItem"

  /integrations:
    get:
      operationId: listIntegrations
      tags: [integrations]
      summary: List configured webhook integrations
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationList"
    post:
      operationId: createIntegration
      tags: [integrations]
      summary: Create a new webhook integration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIntegrationBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"

  /integrations/{id}:
    patch:
      operationId: updateIntegration
      tags: [integrations]
      summary: Update an integration
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIntegrationBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"
    delete:
      operationId: deleteIntegration
      tags: [integrations]
      summary: Delete an integration
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /integrations/{id}/test:
    post:
      operationId: testIntegration
      tags: [integrations]
      summary: Send a test payload to a webhook
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResult"

  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /billing/checkout:
    post:
      operationId: createCheckoutSession
      tags: [billing]
      summary: Create a Stripe checkout session (placeholder if Stripe not configured)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutBody"
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"

  /billing/plan:
    get:
      operationId: getBillingPlan
      tags: [billing]
      summary: Get current plan details
      responses:
        "200":
          description: Plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingPlan"

  /me/ingestion-token:
    get:
      operationId: getIngestionToken
      tags: [ingestion]
      summary: Get the current user's ingestion token (for external webhooks)
      responses:
        "200":
          description: Token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionTokenResponse"
    post:
      operationId: rotateIngestionToken
      tags: [ingestion]
      summary: Rotate (regenerate) the ingestion token
      responses:
        "200":
          description: New token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionTokenResponse"

  /automation-rules:
    get:
      operationId: listAutomationRules
      tags: [automation]
      summary: List automation rules
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRuleList"
    post:
      operationId: createAutomationRule
