      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      operationId: retryCallProcessing
      tags: [calls]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"

  /channels:
