      summary: Create a new automation rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAutomationRuleBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRule"

  /automation-rules/{id}:
    patch:
      operationId: updateAutomationRule
      tags: [automation]
      summary: Update a rule
      parameters:
        - in: path
          name: id
          required: true
