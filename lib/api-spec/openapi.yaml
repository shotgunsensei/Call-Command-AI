  /follow-ups:
    get:
      operationId: listFollowups
      tags: [followups]
      summary: List sent follow-ups
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowupList"

  /calls/{id}/follow-up:
    post:
      operationId: sendFollowup
      tags: [followups]
      summary: Send a follow-up message for a call (simulated email)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendFollowupBody"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Followup"

  /calls/{id}/run-rules:
    post:
      operationId: runRulesForCall
      tags: [automation]
      summary: Re-run automation rules against a single call
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleExecutionResult"

  /ingestion-events:
    get:
      operationId: listIngestionEvents
      tags: [ingestion]
      summary: List recent ingestion events
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionEventList"

  /demo/simulate-call:
    post:
      operationId: simulateInboundCall
      tags: [ingestion]
      summary: Simulate an inbound call event (for demo / no integrations setup)
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"

  /telephony/twilio/status:
    get:
      operationId: getTwilioStatus
      tags: [telephony]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwilioStatus"

  /telephony/events:
    get:
      operationId: listTelephonyEvents
      tags: [telephony]
      parameters:
        - in: query
          name: callId
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelephonyEventList"

  /switchboard:
    get:
      operationId: getSwitchboard
      tags: [switchboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwitchboardResponse"

  /setup/product-modes:
