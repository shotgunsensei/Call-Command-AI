kind = "web"
previewPath = "/"
title = "CallCommand AI"
version = "1.0.0"
id = "artifacts/callcommand"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21886

[services.development]
run = "pnpm --filter @workspace/callcommand run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/callcommand", "run", "build" ]
publicDir = "artifacts/callcommand/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21886"
BASE_PATH = "/"
